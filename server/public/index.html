<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpsTrack Healthcare Portal</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <h1>OpsTrack Healthcare Portal</h1>
        <nav>
            <button id="homeBtn">Home</button>
            <button id="showRegisterBtn">Register</button>
            <button id="showLoginBtn">Login</button>
            <button id="loadCasesBtn">Load Cases</button>
            <button id="logoutBtn">Logout</button>
        </nav>
    </header>

    <main>
        <section id="homeSection" class="card">
            <h2>Welcome</h2>
            <p>Use the navigation buttons above to move through the portal.</p>
        </section>

        <section id="registerSection" class="card hidden">
            <h2>Register</h2>
            <input type="text" id="registerUsername" placeholder="Username" />
            <input type="email" id="registerEmail" placeholder="Email" />
            <input type="password" id="registerPassword" placeholder="Password" />
            <button id="registerBtn">Submit Registration</button>
        </section>

        <section id="loginSection" class="card hidden">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button id="loginBtn">Submit Login</button>
        </section>

        <section id="casesSection" class="card hidden">
            <h2>Cases</h2>
            <div id="casesOutput">No cases loaded yet.</div>
        </section>

        <section class="card">
            <h2>System Status</h2>
            <p id="statusOutput">System is ready.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
